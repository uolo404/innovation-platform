spring:
  application:
    name: innovation
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  data:
    redis:
      database: ${SPRING_DATA_REDIS_DATABASE:1}
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/innovation_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      initialization-fail-timeout: 60000

server:
  port: 8080
  servlet:
    context-path: /api

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.abajin.innovation.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件存储配置
file:
  storage:
    path: ./uploads
  access:
    url: /uploads

jwt:
  secret: ${JWT_SECRET:innovation-platform-secret-key-2024}
  expiration: ${JWT_EXPIRATION:86400000}

# 统一身份认证（与本地账号密码登录串行校验）
unified-auth:
  enabled: ${UNIFIED_AUTH_ENABLED:false}
  mode: ${UNIFIED_AUTH_MODE:LDAP}
  ldap:
    url: ${UNIFIED_AUTH_LDAP_URL:}
    user-dn-pattern: ${UNIFIED_AUTH_LDAP_USER_DN_PATTERN:}
    base-dn: ${UNIFIED_AUTH_LDAP_BASE_DN:}
    search-filter: ${UNIFIED_AUTH_LDAP_SEARCH_FILTER:(uid={0})}
    uid-attr: ${UNIFIED_AUTH_LDAP_UID_ATTR:uid}
    name-attr: ${UNIFIED_AUTH_LDAP_NAME_ATTR:cn}
    college-attr: ${UNIFIED_AUTH_LDAP_COLLEGE_ATTR:ou}

# 日志配置
logging:
  level:
    root: INFO
    com.abajin.innovation: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
