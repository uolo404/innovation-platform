spring:
  application:
    name: innovation
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  data:
    redis:
      # Redis数据库索引（默认为0）
      database: 1
      # Redis服务器地址
      host: 127.0.0.1
      # Redis服务器连接端口
      port: 6379
      # Redis服务器连接密码（默认为空）
      password:
      # 连接超时时间
      timeout: 2s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/innovation?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: innovation
    password: innovation
server:
  port: 8080
  servlet:
    context-path: /api
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.abajin.innovation.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件存储配置
file:
  storage:
    path: ./uploads
  access:
    url: /uploads

# JWT配置
jwt:
  secret: innovation-platform-secret-key-2024
  expiration: 86400000 # 24小时

# 统一身份认证（与本地账号密码登录串行校验）
# 用户仍使用同一个用户名/密码表单登录；后端会先校验本地数据库账号，再校验统一身份认证。
unified-auth:
  enabled: ${UNIFIED_AUTH_ENABLED:false}
  # 目前支持：LDAP（通过LDAP校验用户名密码，并读取基本属性）
  mode: ${UNIFIED_AUTH_MODE:LDAP}
  ldap:
    url: ${UNIFIED_AUTH_LDAP_URL:}
    # 示例：uid={0},ou=people,dc=your-school,dc=edu,dc=cn
    user-dn-pattern: ${UNIFIED_AUTH_LDAP_USER_DN_PATTERN:}
    # 示例：dc=your-school,dc=edu,dc=cn（用于search，建议配置）
    base-dn: ${UNIFIED_AUTH_LDAP_BASE_DN:}
    # 示例：(uid={0}) 或 (sAMAccountName={0})
    search-filter: ${UNIFIED_AUTH_LDAP_SEARCH_FILTER:(uid={0})}
    uid-attr: ${UNIFIED_AUTH_LDAP_UID_ATTR:uid}
    name-attr: ${UNIFIED_AUTH_LDAP_NAME_ATTR:cn}
    college-attr: ${UNIFIED_AUTH_LDAP_COLLEGE_ATTR:ou}

